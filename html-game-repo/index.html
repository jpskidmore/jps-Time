<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sky Dodge</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Sky Dodge</h1>
      <p class="subtitle">Use ← and → keys (or A / D) to dodge falling rocks.</p>
      <div class="hud">
        <span>Score: <strong id="score">0</strong></span>
        <span>Best: <strong id="best">0</strong></span>
      </div>
      <canvas id="game" width="420" height="620" aria-label="Game area"></canvas>
      <button id="restart" hidden>Play Again</button>
    </main>

    <script src="script.js"></script>
  </body>
</html>
